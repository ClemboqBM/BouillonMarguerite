<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouillon Marguerite — Reporting</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --bg2: #161616; --bg3: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #e8e4dc; --text2: #888; --text3: #444;
    --pos: #6dbd8f; --neg: #e05555;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* LOGIN */
  .login {
    width: 100%;
    max-width: 380px;
    padding: 40px;
    text-align: center;
  }

  .login-meta {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'Courier New', monospace;
    margin-bottom: 12px;
  }

  .login h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 40px;
    letter-spacing: -.02em;
  }

  .login-field {
    position: relative;
    margin-bottom: 14px;
  }

  .login-field input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 18px;
    letter-spacing: .3em;
    text-align: center;
    padding: 16px;
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color .15s;
  }

  .login-field input:focus { border-color: rgba(255,255,255,0.3); }
  .login-field input::placeholder { letter-spacing: .1em; font-size: 13px; color: var(--text3); }

  .login-btn {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 12px;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    transition: background .15s, border-color .15s;
  }

  .login-btn:hover { background: var(--bg2); border-color: rgba(255,255,255,0.25); }
  .login-btn:active { transform: scale(0.99); }

  .login-error {
    margin-top: 14px;
    font-size: 12px;
    color: var(--neg);
    font-family: 'Courier New', monospace;
    letter-spacing: .06em;
    min-height: 18px;
  }

  /* DASHBOARD */
  .dashboard { display: none; width: 100%; max-width: 700px; padding: 60px 40px; }

  .dash-meta {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'Courier New', monospace;
    margin-bottom: 12px;
  }

  .dash-title {
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.02em;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'Courier New', monospace;
    margin-bottom: 12px;
  }

  .reports-group { margin-bottom: 40px; }

  .report-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    margin-bottom: 6px;
    transition: background .15s, border-color .15s;
  }

  .report-link:hover { background: var(--bg3); border-color: var(--border2); }

  .report-link-left { display: flex; flex-direction: column; gap: 4px; }

  .report-link-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .report-link-sub {
    font-size: 11px;
    color: var(--text3);
    font-family: 'Courier New', monospace;
  }

  .report-link-arrow {
    font-size: 16px;
    color: var(--text3);
  }

  .logout-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 11px;
    font-family: 'Courier New', monospace;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 40px;
    padding: 0;
  }
  .logout-btn:hover { color: var(--text2); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-meta">Bouillon Marguerite</div>
  <h1>Reporting interne</h1>
  <div class="login-field">
    <input type="password" id="pwd-input" placeholder="Code d'accès" maxlength="20" autocomplete="off" />
  </div>
  <button class="login-btn" onclick="checkPassword()">Accéder</button>
  <div class="login-error" id="login-error"></div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-meta">Bouillon Marguerite &nbsp;·&nbsp; Reporting interne</div>
  <div class="dash-title">Tableau de bord</div>

  <div class="reports-group">
    <div class="section-label">Chiffres d'activité</div>
    <a class="report-link" href="chiffres/2603.html">
      <div class="report-link-left">
        <span class="report-link-title">Analyse mars 2026</span>
        <span class="report-link-sub">Couverts · CA · Ticket moyen · Heatmaps</span>
      </div>
      <span class="report-link-arrow">→</span>
    </a>
  </div>

  <div class="reports-group">
    <div class="section-label">Comptabilité analytique</div>
    <a class="report-link" href="compta/2603.html">
      <div class="report-link-left">
        <span class="report-link-title">SIG mars 2026</span>
        <span class="report-link-sub">Résultats financiers · Ratios · Détail charges</span>
      </div>
      <span class="report-link-arrow">→</span>
    </a>
  </div>

  <button class="logout-btn" onclick="logout()">Se déconnecter</button>
</div>

<script>
  const PASSWORD = 'bouillon2026';
  const SESSION_KEY = 'bm_auth';

  function checkPassword() {
    const val = document.getElementById('pwd-input').value;
    if (val === PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, '1');
      showDashboard();
    } else {
      document.getElementById('login-error').textContent = 'Code incorrect.';
      document.getElementById('pwd-input').value = '';
      document.getElementById('pwd-input').focus();
    }
  }

  function showDashboard() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    location.reload();
  }

  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  if (sessionStorage.getItem(SESSION_KEY) === '1') showDashboard();
</script>
</body>
</html>
